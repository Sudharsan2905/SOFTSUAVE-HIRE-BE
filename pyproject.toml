[tool.ruff]
line-length = 100
target-version = "py311"
exclude = [
    ".venv",
    "__pycache__",
    ".git",
    "temp",
    "migrations",
]

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes — unused imports, undefined names
    "I",    # isort — import ordering
    "B",    # flake8-bugbear
    "C4",   # flake8-comprehensions
    "UP",   # pyupgrade — modern Python syntax
    "N",    # pep8-naming conventions
    "S",    # flake8-bandit — basic security patterns
    "C90",  # McCabe complexity
]
ignore = [
    "S101",  # assert statements — ok in tests
    "S104",  # binding to all network interfaces
    "B008",  # function calls in default arguments — required by FastAPI Depends()
]

[tool.ruff.lint.mccabe]
max-complexity = 15

[tool.ruff.lint.per-file-ignores]
"test/**" = ["S", "N"]
"app/common/exceptions.py" = ["N818"]
"app/common/services/email_service.py" = ["E501"]
"app/components/auth/auth_service.py" = ["B904"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "auto"
