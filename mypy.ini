[mypy]
python_version = 3.12
strict = false
ignore_missing_imports = true
disallow_untyped_defs = true
warn_return_any = true
warn_unused_ignores = true
exclude = test/

# FastAPI endpoint handlers are typed via decorators; return annotations are noise here
[mypy-app.components.auth.auth_router]
disallow_untyped_defs = false

[mypy-app.components.candidate.candidate_router]
disallow_untyped_defs = false

[mypy-app.components.assessment.assessment_router]
disallow_untyped_defs = false

[mypy-app.components.users.user_router]
disallow_untyped_defs = false

[mypy-app.components.workspace.workspace_router]
disallow_untyped_defs = false

[mypy-app.components.question_bank.question_router]
disallow_untyped_defs = false

[mypy-app.factory]
disallow_untyped_defs = false

[mypy-app.common.exception_handlers]
disallow_untyped_defs = false
